experiences:
  title: Experiences
  info:
  - role: Uber Driver 
    time: March 2024 – June 2025
    company: #Self-employment
    details: |
        - Completed 4,244 Uber trips over 15 months with zero accidents or traffic violations
        - Earned 2,000+ five-star reviews, maintaining a 5/5-star rating
        - Demonstrated strong driving skills, especially in harsh winter conditions
        - Showcased excellent safety awareness and customer service
        - Utilized effective communication with diverse customers
  - role: Painting Line Helper
    time: August 2024 – February 2025
    company: CNH Industrial Saskatoon, SK
    details: |
        - Conducted daily safety inspections to ensure compliance and workplace safety
        - Reviewed and managed parts loading/unloading schedules for efficient operations
        - Prepared parts and carts for streamlined loading/unloading processes
        - Executed loading and unloading of parts in a fast-paced environment
        - Collaborated effectively with welders, forklift drivers and assemblers to coordinate tasks
        - Maintained injury-free record and consistently met task deadlines
  - role: Landscape Architect
    time: September 2016 – January 2022
    company: Times China, Guangzhou, China
    details: |
        - Completed eight landscape projects annually using AutoCAD, creating master plans and detailed technical drawings, earning high customer praise.
        - Developed an AutoCAD toolset with Visual Lisp to streamline repetitive tasks and enhance efficiency.
        - Evaluated technical drawings and proposed improvements to optimize design outcomes.
        - Led a team of five landscape designers, managing schedules, ensuring design quality, and fostering team collaboration.
        - Received annual Excellent Leadership Award three times for outstanding team management.
        - Facilitated the adoption of ISO 9001 Quality Management System to improve company operations.
        
